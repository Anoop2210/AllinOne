version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_core_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: crm_core_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crm_core
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change_this_to_a_long_random_secret
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: change_this_to_a_long_random_secret_too
      JWT_REFRESH_EXPIRES_IN: 7d
      SUPER_ADMIN_EMAIL: superadmin@crmcore.com
      SUPER_ADMIN_PASSWORD: ChangeMe@123
    ports:
      - "5000:5000"
    command: >
      sh -c "node src/config/sync.js && node src/seed/seed.js && node src/server.js"

  frontend:
    build: ./frontend
    container_name: crm_core_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
